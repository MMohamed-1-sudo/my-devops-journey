version: '3.8'

services:
  web:
    image: 485185309213.dkr.ecr.eu-north-1.amazonaws.com/flask-mysql:latest
    ports:
      - "5002:5002"
    depends_on:
      - mydb
    environment:
      DB_HOST: mydb
      DB_PASSWORD: my-secret-pw

  mydb:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: my-secret-pw